services:
  - type: web
    name: motrix-api
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OC_LIMITE_APROBACION_GERENCIA
        value: 1500.00
      - key: ML_MODELS_DIR
        value: app/ml/models
      - key: ML_PRIORITY_HIGH_THRESHOLD
        value: 0.90
      - key: ML_PRIORITY_LOW_THRESHOLD
        value: 0.10
      - key: REPORTS_BUCKET
        value: reports
      - key: AUTH_RATE_LIMIT_PER_MINUTE
        value: 5
      - key: CORS_ORIGINS
        value: https://motrix-9tofvb4t7-denzellito17-1790s-projects.vercel.app,http://localhost:3000
